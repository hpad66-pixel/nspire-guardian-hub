name: CI

# PR gate. Runs on every PR and on direct pushes to main/staging.
# Must be green before deploy.yml is allowed to publish anything.

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    # The smoke test (src/hooks/__tests__/hooks.test.ts) imports hooks that pull
    # in src/integrations/supabase/client.ts, which throws at import time if the
    # VITE_SUPABASE_* values are absent. Provide them like the build/e2e jobs do.
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Runs the full Vitest suite WITH coverage and enforces the per-glob gate
      # in vitest.config.ts (≥80% on src/lib/workflow — the Ball-in-Court engine).
      - run: npm run test:coverage

  build:
    name: Production Build
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
      E2E_BASE_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  migration-dry-run:
    name: Supabase Migration Dry-Run
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
      - name: Migration dry-run
        # --include-all: the shared remote DB has diverged (later-dated
        # migrations applied from staging/feature branches than main carries),
        # so new in-order local migrations get flagged "out of order" without
        # it. This is the resolution the CLI itself recommends.
        run: supabase db push --dry-run --include-all

  db-tests:
    name: Supabase DB Tests (pgTAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # Applies every migration to a local Postgres, then runs the pgTAP
      # tests in supabase/tests/. Guards the current_tenant_id() /
      # get_my_workspace_id() recursion fix (WS-5 #5) against real Postgres,
      # which the mocked Vitest suite cannot catch.
      - name: Start local Supabase
        run: supabase start
      - name: Run pgTAP tests
        run: supabase test db
      - name: Stop local Supabase
        if: always()
        run: supabase stop
